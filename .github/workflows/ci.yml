# =============================================================================
# CI de Audio Inmersivo: valida backend, frontend e imagen Docker en cada PR.
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (tests unitarios)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Compilar módulos (detecta errores de sintaxis/imports rotos)
        run: python -m compileall app ../audio_services -q
      - name: Tests unitarios
        run: pytest tests -v
        env:
          # Settings exige estas variables aunque los tests no toquen la DB
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          JWT_SECRET_KEY: ci-only-secret
          MINIO_ROOT_USER: ci
          MINIO_ROOT_PASSWORD: ci-password

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build de producción
        run: npm run build

  docker:
    name: Imagen Docker (backend + prisma generate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build imagen backend
        run: docker build -f backend/Dockerfile .
