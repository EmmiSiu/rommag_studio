# =============================================================================
# Audio Inmersivo - Orquestación de servicios (desarrollo y producción)
# =============================================================================
# Puertos expuestos (convención Easypanel, ver AI_README.MD):
#   - Frontend: 3000
#   - Backend:  8000
#   - MinIO:    9000 (API) + 9001 (Console)
#   - PostgreSQL y Redis: SOLO red interna, no se exponen al host.
# =============================================================================

name: audio-inmersivo

services:
  # ---------------------------------------------------------------------------
  # Frontend: Next.js 15 + PWA
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - audio-net

  # ---------------------------------------------------------------------------
  # Backend: FastAPI + Prisma
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - audio-net

  # ---------------------------------------------------------------------------
  # Worker: Celery (procesamiento de audio pesado: yt-dlp, Demucs, spatial)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        INSTALL_AUDIO_DEPS: "true"
    container_name: ai-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-2}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      # Caché de modelos de IA (Demucs descarga ~2GB la primera vez)
      - model_cache:/root/.cache
    networks:
      - audio-net

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 (solo red interna)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - audio-net

  # ---------------------------------------------------------------------------
  # Redis 7: broker de Celery + caché (solo red interna)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - audio-net

  # ---------------------------------------------------------------------------
  # MinIO: almacenamiento S3-compatible para audios
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: ai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - audio-net

networks:
  audio-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  model_cache:
